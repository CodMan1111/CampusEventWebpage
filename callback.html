<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Callback</title>
  <style>body{font-family:system-ui,Segoe UI,Roboto,Arial;margin:0;padding:24px;background:#f8fafc;color:#111}main{max-width:720px;margin:48px auto;background:#fff;padding:24px;border-radius:10px;box-shadow:0 6px 24px rgba(10,20,40,.06)}pre{white-space:pre-wrap;word-break:break-word}</style>
</head>
<body>
  <main>
    <h1>Signing you in…</h1>
    <p id="status">Exchanging code for tokens...</p>
    <p style="color:#924;padding-top:8px;font-size:13px">Warning: this page includes a client secret in the POST body for local testing only. Do not use this in production.</p>
    <pre id="debug" style="display:none"></pre>
  </main>

  <script>
    (async function(){
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');
      const statusEl = document.getElementById('status');
      const debugEl = document.getElementById('debug');

      if (error) {
        statusEl.textContent = 'Login error: ' + error;
        debugEl.style.display = 'block';
        debugEl.textContent = JSON.stringify(Object.fromEntries(params.entries()), null, 2);
        return;
      }

      if (!code) {
        statusEl.textContent = 'No authorization code found in URL.';
        return;
      }

      try {
        const tokenUrl = 'https://us-east-1cim3gy31f.auth.us-east-1.amazoncognito.com/oauth2/token';
        const body = new URLSearchParams({
          grant_type: 'authorization_code',
          client_id: '3d2fpudvqi7l7k338dddjm159l',
          client_secret: 'mjia1mlogtp6082spn26cs4ioqj2kae2vgak3suu4bv96vu574g',
          code: code,
          redirect_uri: 'http://localhost:3000/callback.html'
        });

        const r = await fetch(tokenUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: body.toString()
        });

        const data = await r.json();
        if (!r.ok) throw new Error(data.error_description || data.error || JSON.stringify(data));

        localStorage.setItem('cognitoTokens', JSON.stringify(data));
        statusEl.textContent = 'Signed in — redirecting...';
        setTimeout(()=>{ window.location.href = '/'; }, 600);

      } catch (e) {
        statusEl.textContent = 'Token exchange failed';
        debugEl.style.display = 'block';
        debugEl.textContent = e && e.message ? e.message : String(e);
      }
    })();
  </script>
</body>
</html>
